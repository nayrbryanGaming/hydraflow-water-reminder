name: hydraflow
description: HydraFlow - Smart hydration habit builder powered by intelligent reminders.
publish_to: 'none'
version: 1.1.0+18

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.4
  firebase_analytics: ^11.3.4
  firebase_crashlytics: ^4.1.4

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.7

  # Local Notifications
  flutter_local_notifications: ^17.2.2

  # Charts
  fl_chart: ^0.69.0

  # Local Storage
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  equatable: ^2.0.5
  dartz: ^0.10.1

  # UI Components
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.2.0+3
  flutter_animate: ^4.5.0
  flutter_markdown: ^0.7.3

  # Timezone (required for local notifications)
  timezone: ^0.9.4

  # Sensors
  sensors_plus: ^6.1.1

  # HTTP
  http: ^1.2.2

  # Permissions
  permission_handler: ^11.3.1

  # Google Sign-In (Major Trust Signal for Play Store)
  google_sign_in: ^6.2.1

  # Image
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  # Fonts are managed dynamically via the google_fonts package for production flexibility.
  # If local fonts are required, place them in assets/fonts/ and uncomment below.
  # fonts:
  #   - family: Outfit
  #     fonts:
  #       - asset: assets/fonts/Outfit-Regular.ttf
  #       - asset: assets/fonts/Outfit-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Outfit-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Outfit-Bold.ttf
  #         weight: 700

flutter_native_splash:
  color: "#F9FBFF"
  image: assets/icons/icon.png
  color_dark: "#0B0E14"
  image_dark: assets/icons/icon.png
  android_12:
    image: assets/icons/icon.png
    icon_background_color: "#F9FBFF"
    icon_background_color_dark: "#0B0E14"

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
